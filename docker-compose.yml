services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: meeting-intelligence-api:local
    environment:
      APP_ENV: ${APP_ENV:-local}
      OFFLINE_MODE: ${OFFLINE_MODE:-true}
      SERVICE_NAME: ${SERVICE_NAME:-meeting-intelligence-api}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      CHROMA_HOST: ${CHROMA_HOST:-chroma}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-meeting_memory}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAX_TRANSCRIPT_CHARS_FOR_DIRECT_SUMMARY: ${MAX_TRANSCRIPT_CHARS_FOR_DIRECT_SUMMARY:-16000}
      CHUNK_MAX_CHARS: ${CHUNK_MAX_CHARS:-1200}
      CHUNK_OVERLAP_CHARS: ${CHUNK_OVERLAP_CHARS:-160}
      MEETINGBANK_URL: ${MEETINGBANK_URL:-}
      DATA_DIR: ${DATA_DIR:-data}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://meeting_intel:meeting_intel@postgres:5432/meeting_intel}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_ISSUER: ${JWT_ISSUER:-meeting-intelligence}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-60}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-60}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meeting_intel}
      POSTGRES_USER: ${POSTGRES_USER:-meeting_intel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meeting_intel}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  chroma:
    image: chromadb/chroma:0.5.5
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  postgres_data:
  chroma_data:
